// FILE: pubspec.yaml

name: voyage_reservation_app
description: Application de réservation de voyages en RDC
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  http: ^1.1.0
  provider: ^6.0.5
  intl: ^0.18.1
  shared_preferences: ^2.2.2
  go_router: ^12.0.0
  flutter_svg: ^2.0.7
  google_fonts: ^6.1.0
  connectivity_plus: ^5.0.1
  flutter_native_splash: ^2.3.5
  flutter_launcher_icons: ^0.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600

flutter_native_splash:
  color: "#1A3A6B"
  image: assets/images/splash_logo.png
  android: true
  ios: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21